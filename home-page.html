<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Page</title>
  <!-- dasyui and tallwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- font awsome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
  <header>
    <div class="navbar bg-base-100 shadow-sm flex-col lg:flex lg:flex-row space-y-3 justify-between px-10">
      <div class="flex items-center gap-2">
          <img src="./images/github-logo.png" alt="" class="w-[40px]">
          <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
        </h2>
      </div>
      <div class="flex gap-2">
       <div class="join">
  <div>
    <label class="input join-item">
      
      <input id="input" type="text" placeholder="search" required />
    </label>
  </div>
  <button id="btn-search" class="btn btn-primary join-item">+ New Issue</button>
</div>
          
    </div>
  </header>
  <section>
    <div id="btn-container" class="w-11/12 bg-white shadow-md mx-auto mt-10 p-3 flex justify-center lg:flex gap-2 lg:justify-start">
      <button class="btn btn-primary" id="all-btn">All</button>
      <button class="btn" id="open-btn">Open</button>
      <button class="btn" id="closed-btn">Closed</button>
    </div>
  </section>

  <section>
    <div id="btn-container" class="w-11/12 bg-white shadow-md mx-auto mt-5 mb-5 p-5  lg:flex lg:justify-between items-center">
      <div class="flex justify-between">
        <div class="flex gap-2 items-center">

          <div>
            <img src="./images/Aperture.png" alt="" class="w-[60px]">
          </div>

          <div>
            <p class="font-bold text-2xl"><span id="count">0</span> Issues</p>
            <h2>Track and manage your project issues</h2>
          </div>
        </div>
      </div>
      <div class="">
        <ul class="flex gap-3 justify-center mt-2.5">
          <li><i class="fa-solid fa-circle text-green-400"></i>open</li>
          <li><i class="fa-solid fa-circle text-purple-700"></i>closed</li>
        </ul>
      </div>
    </div>
  </section>
<!-- modal section -->
  <section>
    <div id="card-container" class="w-11/12 mx-auto sm: grid grid-cols-1 lg:grid lg:grid-cols-4 gap-5 ">

     
    </div>
  </section>
  <section>
    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
      <div id="modal-container" class="modal-box">
       
        </div>

       
      </div>
    </dialog>
  </section>
  <script src="./js/home-page.js"></script>
</body>

</html>
