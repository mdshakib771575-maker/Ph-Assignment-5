<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <!-- dasyui and tallwind -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- font awsome -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
<header >
    <div class="navbar bg-base-100 shadow-sm justify-between px-10">
  <div class="flex">
    <img src="./images/github-logo.png" alt="" class=" w-[36px] h-[37px]">
    <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
  </div>
  <div class="flex gap-2">
    <input type="text" placeholder= 'Search' class="input input-bordered w-24 md:w-auto" />
    <button class="btn btn-primary"> + New Issue</button>
    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
      
      </div>
      <ul
        tabindex="-1"
        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
        <li>
          <a class="justify-between">
            Profile
            <span class="badge">New</span>
          </a>
        </li>
        <li><a>Settings</a></li>
        <li><a>Logout</a></li>
      </ul>
    </div>
  </div>
</div>
</header>
    <section>
      <div id="btn-container" class="w-11/12 bg-white shadow-md mx-auto mt-15 p-3 flex gap-2">
        <button class="btn btn-primary">All</button>
        <button class="btn">Open</button>
        <button class="btn">Closed</button>

      </div>
    </section>
    <script src=""></script>
</body>
</html>
